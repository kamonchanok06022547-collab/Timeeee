<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* แผงควบคุม */
        .admin-panel {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        input[type="color"] {
            height: 38px;
            width: 100%;
            padding: 2px;
            cursor: pointer;
        }

        /* ส่วนแสดงผลที่ต้องแคปรูป */
        .preview-label {
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .taskbar-box {
            background-color: #0f0f0f; /* สีเริ่มต้น */
            color: #ffffff;
            padding: 4px 10px;
            text-align: right;
            width: fit-content;
            border-radius: 2px;
            transition: background 0.2s;
        }

        .time-text {
            font-size: 12px;
            line-height: 1.2;
            display: block;
            font-weight: 400;
        }

        .date-text {
            font-size: 12px;
            line-height: 1.2;
            display: block;
        }
    </style>
</head>
<body>

    <div class="admin-panel">
        <div class="control-group">
            <label>เวลา (HH:mm)</label>
            <input type="text" id="timeIn" value="10:29" oninput="render()">
        </div>
        <div class="control-group">
            <label>วันที่ (D/M/YYYY)</label>
            <input type="text" id="dateIn" value="26/2/2569" oninput="render()">
        </div>
        <div class="control-group">
            <label>สีพื้นหลัง</label>
            <input type="color" id="colorIn" value="#0f0f0f" oninput="render()">
        </div>
    </div>

    <div class="preview-label">ผลลัพธ์สำหรับแคปรูป:</div>
    
    <div class="taskbar-box" id="displayBox">
        <span class="time-text" id="outTime">10:29</span>
        <span class="date-text" id="outDate">26/2/2569</span>
    </div>

    <script>
        function render() {
            // ดึงค่าจากช่องกรอก
            const time = document.getElementById('timeIn').value;
            const date = document.getElementById('dateIn').value;
            const bgColor = document.getElementById('colorIn').value;

            // แสดงผลในกล่องดำ
            document.getElementById('outTime').innerText = time;
            document.getElementById('outDate').innerText = date;
            document.getElementById('displayBox').style.backgroundColor = bgColor;
        }
    </script>

</body>
</html>
