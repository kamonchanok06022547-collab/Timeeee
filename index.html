<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-pastel: linear-gradient(135deg, #E1F5FE 0%, #B3E5FC 100%);
            --pastel-blue-btn: #81D4FA;
            --text-dark: #546E7A;
        }

        body { 
            background: var(--bg-pastel);
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 50px;
        }

        /* หน้าต่างควบคุม */
        .main-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 45px; border-radius: 40px;
            width: 600px; box-shadow: 0 20px 45px rgba(0,0,0,0.05);
            border: 3px solid #E1F5FE; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px;
            position: relative; /* เพื่อวางชื่อจูสุดหล่อ */
        }

        h1 { grid-column: span 2; text-align: center; color: #0288D1; font-size: 32px; margin: 0; }

        .input-group { display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: bold; color: #78909C; margin-bottom: 8px; }
        
        input, select { 
            padding: 15px; border: 2px solid #E1F5FE; border-radius: 20px; 
            background: #fff; font-size: 16px; outline: none;
        }

        /* เปลี่ยนข้อความปุ่มตามสั่ง */
        button { 
            grid-column: span 2; padding: 20px; border: none; border-radius: 25px;
            background: linear-gradient(45deg, var(--pastel-blue-btn), #B3E5FC); color: white;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 15px; box-shadow: 0 10px 20px rgba(129, 212, 250, 0.3);
        }
        button:hover { transform: translateY(-3px); filter: brightness(1.05); }

        /* ชื่อจูสุดหล่อ ตัวเล็กๆๆๆ ขวาล่าง */
        .credit {
            position: absolute;
            bottom: 15px;
            right: 25px;
            font-size: 9px;
            color: #B0BEC5;
            letter-spacing: 0.5px;
        }

        /* --- ส่วนก๊อปปี้นาฬิกา --- */
        .preview-wrapper { margin-top: 60px; padding: 0; background: transparent; }

        #captureArea { 
            display: inline-flex; align-items: center; 
            padding: 4px 10px; 
            background-color: #0f0f0f; 
            color: white; gap: 6px;
            border: 0 !important; outline: 0 !important; margin: 0 !important;
            box-sizing: border-box;
            border-radius: 0 !important;
        }

        .text-stack { text-align: right; line-height: 1.1; pointer-events: none; }
        .t-font { font-size: 13px; display: block; }
        .d-font { font-size: 12px; display: block; }
        #bellIcon { display: none; width: 18px; height: 18px; fill: white; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>🚦 Time Time Time 🚦</h1>
        
        <div class="input-group">
            <label>🕒 เวลา</label>
            <input type="text" id="inT" value="11:23" oninput="update()">
        </div>
        
        <div class="input-group">
            <label>📅 วันที่</label>
            <input type="text" id="inD" value="26/2/2569" oninput="update()">
        </div>
        
        <div class="input-group">
            <label>🎨 สีพื้นหลัง</label>
            <input type="color" id="inC" value="#0f0f0f" oninput="update()" style="height:55px; padding:5px; cursor:pointer;">
        </div>
        
        <div class="input-group">
            <label>🔔 กระดิ่ง</label>
            <select id="inL" onchange="update()">
                <option value="none">ปิด</option>
                <option value="flex">เปิด (ขวา)</option>
            </select>
        </div>
        
        <button onclick="copyToClipboard()">🌀 ก๊อปปี้เลยครับสุดสวย 🌀</button>

        <div class="credit">จูสุดหล่อ</div>
    </div>

    <div class="preview-wrapper">
        <div id="captureArea">
            <div class="text-stack">
                <span class="t-font" id="outT">11:23</span>
                <span class="d-font" id="outD">26/2/2569</span>
            </div>
            <svg id="bellIcon" viewBox="0 0 24 24">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
            </svg>
        </div>
    </div>

    <script>
        function update() {
            document.getElementById('outT').innerText = document.getElementById('inT').value;
            document.getElementById('outD').innerText = document.getElementById('inD').value;
            document.getElementById('captureArea').style.backgroundColor = document.getElementById('inC').value;
            document.getElementById('bellIcon').style.display = document.getElementById('inL').value;
        }

        async function copyToClipboard() {
            const area = document.getElementById('captureArea');
            
            // Render และตัดขอบทิ้ง 2 พิกเซล เพื่อกันขอบสีเขียว/ขาว
            const tempCanvas = await html2canvas(area, { 
                backgroundColor: null, 
                scale: 3, 
                logging: false,
                width: area.offsetWidth,
                height: area.offsetHeight
            });

            const finalCanvas = document.createElement('canvas');
            const ctx = finalCanvas.getContext('2d');
            const cropAmount = 2; 
            
            finalCanvas.width = (tempCanvas.width) - (cropAmount * 2);
            finalCanvas.height = (tempCanvas.height) - (cropAmount * 2);

            ctx.drawImage(tempCanvas, 
                cropAmount, cropAmount, finalCanvas.width, finalCanvas.height, 
                0, 0, finalCanvas.width, finalCanvas.height
            );

            finalCanvas.toBlob(blob => {
                const item = new ClipboardItem({ "image/png": blob });
                navigator.clipboard.write([item]).then(() => {
                    alert("ก๊อปปี้ให้แล้วจ้าสุดสวย! 🚦");
                });
            }, "image/png");
        }
    </script>
</body>
</html>
